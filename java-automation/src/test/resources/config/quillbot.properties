# QuillBot AI Chat profile.
# Run with: .\java-automation\scripts\mvn-java21.ps1 -Dchatbot.config=config/quillbot.properties -Pcucumber verify
chatbot.url=https://quillbot.com/ai-chat
chatbot.browser=chrome
chatbot.headless=false
chatbot.login.required=false

# QuillBot switches input/send components after the first message.
# Both the initial and active-conversation test IDs are included below.
chatbot.input.selector=[data-testid='ai-chat-input'],[data-testid='unified-ai-chat-input']
chatbot.send.selector=[data-testid='quill-chat-send-button'],[data-testid='ai-chat-send-button']
chatbot.send.mode=button
chatbot.assistantMessage.selector=[data-testid='ai-chat-response']
chatbot.newChat.selector=
chatbot.dismiss.selector=#onetrust-accept-btn-handler,button[aria-label*='Accept'],button[aria-label*='Close'],button[aria-label*='close']
chatbot.response.ignoreTexts=AI responses may be inaccurate|Don't enter sensitive info|Type your message|Terms of Service|Privacy Policy|Upgrade to Premium|Quillbot for Chrome
chatbot.response.timeoutSeconds=90
chatbot.response.stableMillis=2500
